<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/contact-me" method="post">
        UserName: <input type="Text" placeholder="Enter Text" > <br>
        Password: <input type="password"> <br>
        <input type="submit"> <hr>
        <input type="text" name="username" value="John"> <hr>
        <label for="username">UserName:</label>
        <input type="text" id="username" name="username"> <hr>
        Date: <input type="date"> <hr>
        File: <input type="file"> <hr>
        Color: <input type="color"> <hr>
        Price Range: <input type="range"> <hr>
        Button: <input type="button" value="click me"> <hr>

        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="Male"> <br>
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="Female"> <br>
        Other: <input type="radio" name="gender"> <hr> 

        C: <input type="checkbox" name="lang" id="c"> <br>
        Java: <input type="checkbox" name="lang" id="java"> <br>
        Python: <input type="checkbox" name="lang" id="python"> <hr>

        <label for="fruits"> Choose a fruit:</label>
        <select id="fruits" name="fruits">
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="cherry">Cherry</option>
        </select> <hr>

        <textarea rows="4" cols="40">
            Please write a story here...
        </textarea> <hr>

        <iframe width="560" height="315" src="https://www.youtube.com/embed/rklidcZ-aLU?si=G9LSDIx_O4QuNfFX" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    </form>
</body>
</html>
